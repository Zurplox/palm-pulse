name: Build daily palm-oil briefing
on:
  push:
    branches: [main]
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Collect and summarize news
        if: github.event_name != 'push'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash-lite' }}
        run: python scripts/fetch_news.py
      - name: Validate
        run: |
          python -m py_compile scripts/fetch_news.py scripts/qa.py
          python scripts/qa.py
          node --check /dev/stdin < <(sed -n '/<script>/,/<\/script>/p' index.html | sed '1d;$d')
      - name: Save edition
        if: github.event_name != 'push'
        run: |
          git config user.name palm-pulse-bot
          git config user.email actions@users.noreply.github.com
          git add data/
          git diff --cached --quiet || git commit -m "chore: update daily briefing"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
