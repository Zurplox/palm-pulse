name: Build daily palm-oil briefing

on:
  push:
    branches: [main]
  schedule:
    - cron: "30 22 * * *" # 06:30 Singapore/Malaysia, 05:30 WIB
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Collect and summarize news
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.5-flash' }}
          MAX_AI_SUMMARIES: "8"
        run: python scripts/fetch_news.py
      - name: Safety-check generated data
        run: |
          python -m py_compile scripts/fetch_news.py scripts/qa.py
          python scripts/qa.py
          node --check assets/app.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
