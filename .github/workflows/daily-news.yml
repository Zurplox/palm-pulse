name: Build daily palm-oil briefing

on:
  push:
    branches: [main]
  schedule:
    - cron: "30 22 * * *" # 06:30 Singapore / Malaysia, 05:30 WIB
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Collect and summarize news
        if: github.event_name != 'push'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.5-flash' }}
          MAX_AI_SUMMARIES: "8"
        run: python scripts/fetch_news.py
      - name: Safety-check generated data
        if: github.event_name != 'push'
        run: python scripts/qa.py
      - name: Save latest edition
        if: github.event_name != 'push'
        run: |
          git config user.name "palm-pulse-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update daily briefing"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Validate repository
        run: python scripts/qa.py
